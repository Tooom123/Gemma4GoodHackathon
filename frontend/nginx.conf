server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend
    location /chat/ {
        proxy_pass http://backend:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
    location /scenarios/ { proxy_pass http://backend:8000; }
    location /progress/  { proxy_pass http://backend:8000; }
    location /tts/       { proxy_pass http://backend:8000; }
    location /whisper/   { proxy_pass http://backend:8000; }
}
