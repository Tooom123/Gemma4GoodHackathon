services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - WHISPER_BIN=/usr/local/bin/whisper-cpp
      - WHISPER_MODEL=/models/whisper/ggml-small.bin
      - PIPER_BIN=/usr/local/bin/piper
      - PIPER_VOICE_FR=/models/piper/fr_FR-upmc-medium.onnx
    volumes:
      - ./backend/data:/app/data
      - ollama_models:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_models:
